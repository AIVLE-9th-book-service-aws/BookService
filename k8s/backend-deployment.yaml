apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookapp-backend
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: bookapp-backend
    spec:
      containers:
        - name: bookapp-backend
          image: BACKEND_IMAGE_URI_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://team18-mysql.c1mh0qkikyty.us-east-1.rds.amazonaws.com:3306/mini5?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"

            - name: SPRING_DATASOURCE_USERNAME
              value: "root"

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SPRING_DATASOURCE_PASSWORD

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET

            - name: ADMIN_USERNAME
              value: "admin"

            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: ADMIN_PASSWORD

            - name: CORS_ALLOWED_ORIGINS
              value: "http://localhost:5173"

            - name: JPA_SHOW_SQL
              value: "false"