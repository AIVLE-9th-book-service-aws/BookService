apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookapp-frontend
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: bookapp-frontend
    spec:
      containers:
        - name: bookapp-frontend
          image: FRONTEND_IMAGE_URI_PLACEHOLDER
          ports:
            - containerPort: 80