version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 20
  pre_build:
    commands:
      - cd FrontEnd/frontend && npm install && cd ../../
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 879772956301.dkr.ecr.us-east-1.amazonaws.com
      - aws eks update-kubeconfig --region us-east-1 --name $ACCOUNT-cluster
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
  build:
    commands:
      - cd FrontEnd/frontend && npm run build && cd ../../
      - cd BackEnd && chmod +x ./gradlew && ./gradlew clean build -x test && docker build -t team18-dev5-backend -f Dockerfile . && cd ..
      - docker tag team18-dev5-backend:latest 879772956301.dkr.ecr.us-east-1.amazonaws.com/team18-dev5-backend:$IMAGE_TAG
  post_build:
    commands:
      - docker push 879772956301.dkr.ecr.us-east-1.amazonaws.com/team18-dev5-backend:$IMAGE_TAG
      - kubectl set image deployment/backend backend=879772956301.dkr.ecr.us-east-1.amazonaws.com/team18-dev5-backend:$IMAGE_TAG
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'
  base-directory: FrontEnd/frontend/dist
  discard-paths: no