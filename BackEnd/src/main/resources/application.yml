server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: bookapp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mini5?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: aivle
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true   # Hibernate 테이블 생성 완료 후 data.sql 실행
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  sql:
    init:
      mode: never               # ddl-auto: update로 변경 시 never로 함께 변경


